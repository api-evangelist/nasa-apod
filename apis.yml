apis:

  - aid: nasa-apod:nasa-apod
    name: NASA APOD API
    description: >
      Single-endpoint REST API returning the Astronomy Picture of the Day with
      title, explanation, image URL, HD image URL, media type, copyright, and
      optional concept tags. Supports date-based filtering and random image
      selection.
